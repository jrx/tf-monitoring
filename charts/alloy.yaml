# Values for grafana/alloy.
# Reference: https://github.com/grafana/alloy/blob/main/operations/helm/charts/alloy/values.yaml
#
# Alloy replaces Promtail (EOL Feb 2025). This deployment tails pod logs via
# the Kubernetes API and receives n8n Enterprise Log-Streaming syslog events
# on port 1514, then forwards both to Loki.
#
# The actual Alloy River config lives in charts/alloy-config.river and is
# rendered into a ConfigMap by the `kubernetes_config_map.alloy_config`
# Terraform resource. We deliberately bypass the chart's bundled
# `configMap.create = true` path because that runs the content through
# Helm's `tpl` first, which would mangle Alloy's own `{{ ... }}` template
# syntax used by `stage.template` to derive facility/severity labels.

alloy:
  configMap:
    # Don't let the chart create or template the ConfigMap. We supply our own
    # to keep Alloy's `{{ ... }}` template syntax intact (Helm would otherwise
    # try to evaluate it as a Helm template).
    create: false
    name:   alloy-config
    key:    config.alloy

  # Open the syslog listener port on the Alloy container. 1514 is the
  # unprivileged conventional port for syslog and avoids needing
  # CAP_NET_BIND_SERVICE just to bind <1024. The chart's bundled `alloy`
  # Service publishes this port too, but consumers should prefer the
  # dedicated `alloy-syslog` Service (see alloy-syslog.tf) for clarity.
  extraPorts:
    - name: syslog-tcp
      port: 1514
      targetPort: 1514
      protocol: TCP

controller:
  type: daemonset

# Skip the chart's bundled config-reloader sidecar; the configmap is rendered
# from Terraform and changes will roll the DaemonSet via the values hash anyway.
configReloader:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
