# Values for jaegertracing/jaeger — all-in-one, in-memory.
#
# This runs the single Jaeger v2 binary (a thin OpenTelemetry Collector
# distribution) as one Deployment. It receives OTLP from n8n and serves the
# Jaeger query API/UI from the same pod.
#
# SANDBOX ONLY: traces are held in a bounded in-memory ring buffer
# (max_traces below) and are lost on pod restart — the same posture as Loki's
# filesystem storage in this module. For anything beyond a sandbox, switch the
# jaeger_storage backend to Badger (add a PVC) or an external store
# (Elasticsearch / Cassandra) and review retention.
#
# n8n sends traces here over OTLP HTTP on 4318; see the dedicated
# `jaeger-otlp` Service (jaeger.tf) and the README "OpenTelemetry tracing"
# section. The Grafana Jaeger datasource (uid: jaeger) talks to the query API
# on 16686 — wired in charts/kube-prometheus-stack.yaml.
#
# SPAN METRICS: the spanmetrics connector derives RED metrics from every span
# and the prometheus exporter publishes them on :8889 (the chart's pre-wired
# `span-metrics` Service port). Prometheus scrapes that endpoint via the
# `jaeger-spanmetrics` ServiceMonitor in charts/kube-prometheus-stack.yaml,
# and the n8n-traces dashboard renders them. This is what makes trace-derived
# rate/error/latency dashboards possible — Jaeger's in-memory trace store has
# no metrics backend of its own. Jaeger's own "Monitor" tab is intentionally
# NOT enabled (would need metric_backends + monitor.menuEnabled); the Grafana
# dashboard is the consumer instead.

jaeger:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

# Replace the chart's default (Elasticsearch-backed) Jaeger v2 pipeline with a
# minimal in-memory one: OTLP in -> batch -> in-memory trace store, queried by
# the bundled jaeger_query extension.
#
# Keys mirror the upstream Jaeger v2 all-in-one config
# (github.com/jaegertracing/jaeger/tree/main/cmd/jaeger). `storage.type: memory`
# below keeps the chart's maintenance jobs (ES index cleaner etc.) disabled.
userconfig:
  service:
    extensions: [jaeger_storage, jaeger_query, healthcheckv2]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        # Fan every span to both the trace store AND the span_metrics connector.
        exporters: [jaeger_storage_exporter, span_metrics]
      # span_metrics connector emits RED metrics into this pipeline; the
      # prometheus exporter publishes them on :8889 for Prometheus to scrape.
      metrics/spanmetrics:
        receivers: [span_metrics]
        exporters: [prometheus]
    telemetry:
      # Array-of-{name,value} form. Jaeger v2 (OTel Collector) deprecated the
      # legacy inline map (`resource: {service.name: jaeger}`) and logs a
      # warning for it at startup. This only labels Jaeger's OWN self-telemetry
      # — it does not affect n8n's exported spans.
      resource:
        attributes:
          - name: service.name
            value: jaeger
  extensions:
    healthcheckv2:
      use_v2: true
      http:
        endpoint: 0.0.0.0:13133
    jaeger_query:
      storage:
        traces: primary_store
    jaeger_storage:
      backends:
        primary_store:
          memory:
            # Bounded ring buffer. ~100k spans is plenty for a sandbox; raise
            # if you need a deeper history, but remember it's all in RAM.
            max_traces: 100000
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
  connectors:
    # Derive RED metrics from spans. Beyond the always-on default dimensions
    # (service_name, span_name, span_kind, status_code), add a small set of
    # n8n span attributes so metrics can be sliced per workflow / execution
    # status. Keep this list short — every dimension is a Prometheus label
    # and multiplies series cardinality.
    #
    # Component type is `span_metrics` (the `spanmetrics` alias is deprecated
    # in Jaeger v2's collector). Metric names are unaffected — they come from
    # the connector's `traces.span.metrics` namespace -> traces_span_metrics_*.
    span_metrics:
      dimensions:
        - name: n8n.workflow.name
        - name: n8n.execution.status
  exporters:
    jaeger_storage_exporter:
      trace_storage: primary_store
    # Prometheus scrape endpoint for the spanmetrics output (chart's
    # `span-metrics` Service port). Scraped by the jaeger-spanmetrics
    # ServiceMonitor.
    prometheus:
      endpoint: 0.0.0.0:8889

storage:
  type: memory
